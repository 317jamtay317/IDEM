# Local development stack for RecordKeeping (HTTPS).
#
# Services:
#   sql-server  - SQL Server database.
#   api         - RecordKeeping.Api (SPA + OAuth/OpenIddict authorization server).  https://localhost:8443 (default)
#   mcp         - The MCP server for AI agents (Claude, ChatGPT, Copilot).          https://localhost:8444/mcp (default)
#
# TLS: Kestrel terminates HTTPS using a dev certificate at ./certs/recordkeeping.pfx.
# The cert-init service below auto-generates this cert on `up` if it is missing, so the
# stack starts out of the box on a fresh clone with no manual step. That auto-generated
# cert is self-signed and NOT trusted by your OS, so browsers/curl will warn (use curl -k).
#
# For a browser-TRUSTED cert (no warning), generate it once on the host instead — cert-init
# detects the existing file and leaves it untouched:
#   dotnet dev-certs https -ep certs/recordkeeping.pfx -p DevCert!123 --trust
#
# AI agents require HTTPS for any non-localhost MCP URL, which is why these services are HTTPS.
#
# Usage:
#   docker compose up --build        # build the image and start everything
#   docker compose up sql-server     # DB only (run a host process with `dotnet run`)
#   docker compose down              # stop; add -v to drop the SQL data volume
#
# Running more than one stack at once (e.g. one per git worktree):
#   The api/mcp/sql host ports below FLOAT so concurrent stacks don't collide. The easy path
#   is scripts/up.ps1 — it picks the first free port at/above each default, names the compose
#   project per directory (so container names don't clash either), brings the stack up, and
#   PRINTS the chosen app + MCP URLs. To pin ports by hand, set API_HOST_PORT / MCP_HOST_PORT /
#   SQL_HOST_PORT (and COMPOSE_PROJECT_NAME) before `up`. Inspect a running stack's ports with
#   `docker compose port api 8443`, `docker compose port mcp 8443`, or `docker compose ps`.
#   Note: container_name is intentionally NOT set; the compose project name prefixes every
#   container instead (<project>-api-1, etc.). scripts/up.ps1 writes COMPOSE_PROJECT_NAME to
#   .env from the feature/branch name, so containers read as <feature>-api-1. Use
#   `docker compose logs <service>` (e.g. `docker compose logs api`).
#
# Set SA_PASSWORD / CERT_PASSWORD in a local .env to override the dev defaults. The
# defaults are for fresh local environments only — never use them in a deployment.

x-app-tls: &app-tls
  ASPNETCORE_URLS: "https://+:8443"
  ASPNETCORE_Kestrel__Certificates__Default__Path: "/https/recordkeeping.pfx"
  ASPNETCORE_Kestrel__Certificates__Default__Password: "${CERT_PASSWORD:-DevCert!123}"

services:
  # Bootstraps the Kestrel HTTPS dev cert into ./certs on `up` so the stack starts
  # without a manual step. Runs to completion before api/mcp start (they depend on it),
  # and is a no-op when a cert already exists — including a host-trusted one you made
  # yourself. Uses the .NET SDK image (already pulled for the api build) for dev-certs.
  cert-init:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    environment:
      CERT_PASSWORD: "${CERT_PASSWORD:-DevCert!123}"
    volumes:
      - ./certs:/certs
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        if [ -f /certs/recordkeeping.pfx ]; then
          echo "cert-init: /certs/recordkeeping.pfx already exists - leaving it untouched."
        else
          echo "cert-init: no cert found - generating /certs/recordkeeping.pfx"
          dotnet dev-certs https -ep /certs/recordkeeping.pfx -p "$$CERT_PASSWORD"
          echo "cert-init: cert generated."
        fi

  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:-Devp@ssword!123}"
      MSSQL_PID: "Developer"
    ports:
      # Host port is configurable to avoid clashing with a SQL Server already
      # installed on the host (which binds 1433). The API talks to SQL over the
      # internal Docker network (sql-server:1433), so this mapping is only for
      # host-based tools; default 14333 sidesteps the common local-SQL conflict.
      - "${SQL_HOST_PORT:-14333}:1433"
    volumes:
      - sql-data:/var/opt/mssql
    healthcheck:
      # mssql-tools18 ships with the 2022 image; -C trusts the self-signed cert.
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: src/RecordKeeping.Api/Dockerfile
    # Project-scoped tag: the mcp service reuses this exact image (no rebuild), and parallel
    # stacks (one per worktree) get distinct tags instead of clobbering a shared :latest.
    # COMPOSE_PROJECT_NAME is set per stack by scripts/up.ps1 (else the compose/dir name).
    image: recordkeeping-app:${COMPOSE_PROJECT_NAME:-recordkeeping}
    depends_on:
      cert-init:
        condition: service_completed_successfully
      sql-server:
        condition: service_healthy
    environment:
      <<: *app-tls
      ASPNETCORE_ENVIRONMENT: "Development"
      # Standard ASP.NET ConnectionStrings:RecordKeeping configuration key.
      ConnectionStrings__RecordKeeping: "Server=sql-server,1433;Database=RecordKeeping;User Id=sa;Password=${SA_PASSWORD:-Devp@ssword!123};TrustServerCertificate=True;Encrypt=True"
    volumes:
      - ./certs:/https:ro
    ports:
      # Floats so multiple stacks coexist; scripts/up.ps1 picks the first free port >= 8443.
      # Override with API_HOST_PORT. The container always listens on 8443 internally.
      - "${API_HOST_PORT:-8443}:8443"
    healthcheck:
      test: ["CMD", "curl", "-fsSk", "https://localhost:8443/.well-known/oauth-authorization-server"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # The MCP server for AI agents. RecordKeeping is a single app that hosts the MCP
  # endpoint together with its OAuth authorization server, so this service runs the
  # same image as `api` — exposed over HTTPS on its own port as the MCP entry point.
  #
  # Agents (Claude, ChatGPT, Copilot) connect to one URL and everything else is
  # auto-discovered (the OAuth URLs derive from the request host/scheme, so they
  # resolve to https on this service at :8444):
  #   MCP endpoint:    https://localhost:8444/mcp
  #   OAuth discovery: https://localhost:8444/.well-known/oauth-protected-resource/mcp
  #                    https://localhost:8444/.well-known/oauth-authorization-server
  #   Self-register:   https://localhost:8444/connect/register   (RFC 7591 DCR)
  #
  # Starts after `api` is healthy so the database schema + seed data exist before this
  # container boots (the seeder is idempotent, so this just avoids a first-boot race).
  mcp:
    image: recordkeeping-app:${COMPOSE_PROJECT_NAME:-recordkeeping}
    depends_on:
      cert-init:
        condition: service_completed_successfully
      sql-server:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      <<: *app-tls
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__RecordKeeping: "Server=sql-server,1433;Database=RecordKeeping;User Id=sa;Password=${SA_PASSWORD:-Devp@ssword!123};TrustServerCertificate=True;Encrypt=True"
    volumes:
      - ./certs:/https:ro
    ports:
      # Floats like the api port; scripts/up.ps1 picks the first free port >= 8444 and prints
      # it (this is the URL agents connect to). Override with MCP_HOST_PORT.
      - "${MCP_HOST_PORT:-8444}:8443"
    healthcheck:
      test: ["CMD", "curl", "-fsSk", "https://localhost:8443/.well-known/oauth-protected-resource/mcp"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  sql-data:
